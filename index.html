<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport must come before any `media=` preload so (max-width: 800px) matches on phones. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <!-- First network requests on mobile: hero MP4 only (≤800). Desktop: hero MP4 only (≥801). -->
    <link
      rel="preload"
      href="/assets/video/hero-fold-mobile.mp4"
      as="video"
      type="video/mp4"
      fetchpriority="high"
      media="(max-width: 800px)"
    />
    <link
      rel="preload"
      href="/assets/video/hero-fold-desktop.mp4"
      as="video"
      type="video/mp4"
      fetchpriority="high"
      media="(min-width: 801px)"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
    <!-- Canonical + primary URL for OG/sitemap; change if production host differs (see README). -->
    <link rel="canonical" href="https://blockchain.commonwealthunion.com/" />
    <meta
      name="description"
      content="Commonwealth Union is going on-chain. 56 nations, 2.9 billion people, $19T economy. $CWU is the official token of Commonwealth Union — built on Solana, backed by an International Advisory Board of presidents, prime ministers, and senior statesmen."
    />
    <meta
      name="keywords"
      content="Commonwealth Union, CWU token, $CWU, Solana token, Commonwealth blockchain, digital assets, Commonwealth nations, blockchain"
    />
    <meta name="theme-color" content="#041825" />
    <meta name="author" content="Commonwealth Union" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
